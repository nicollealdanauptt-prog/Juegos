<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ULTRA-VIP NICOLLE 🤫</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rosa-neon: #ff00ff; --cian-neon: #00ffff; --oro: #ffd700; --rojo: #ff0000; --verde: #00ff66; }
        
        body { 
            background: radial-gradient(circle, #0f0f0f 0%, #000 100%); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Efecto TV vieja */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .contenedor { 
            width: 100%; 
            max-width: 400px; 
            background: rgba(10, 10, 10, 0.9); 
            padding: 30px 20px; 
            border: 1px solid #333; 
            text-align: center; 
            position: relative; 
            z-index: 1;
        }
        
        h1 { font-family: 'Syncopate', sans-serif; font-size: 0.9rem; letter-spacing: 3px; color: var(--cian-neon); margin-bottom: 25px; }
        
        .paso { display: none; }
        .activo { display: block; animation: aparecer 0.4s ease; }
        
        @keyframes aparecer { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        input { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--verde); 
            font-family: 'Courier New', monospace; font-size: 1rem; text-align: center; margin-bottom: 15px; box-sizing: border-box; outline: none; 
        }

        .instruccion { font-size: 0.7rem; color: #666; margin-bottom: 15px; text-transform: uppercase; }
        .pregunta-personal { color: var(--rosa-neon); font-weight: bold; margin-bottom: 10px; font-size: 0.85rem; text-align: left; border-left: 3px solid var(--rosa-neon); padding-left: 8px; }
        
        button { 
            width: 100%; padding: 12px; background: transparent; border: 1px solid var(--rosa-neon); color: var(--rosa-neon); 
            font-weight: bold; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; font-size: 0.8rem;
        }

        /* AJUSTE PANTALLA DE ERROR PARA MÓVIL */
        #pantalla-error { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; color: var(--rojo); z-index: 10000; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 20px; 
            box-sizing: border-box;
        }
        
        #pantalla-error h1 { 
            font-size: 1.5rem; /* Tamaño reducido para que no se corte */
            color: var(--rojo); 
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #pantalla-error p {
            font-size: 0.9rem;
            line-height: 1.4;
            max-width: 90%;
            margin-bottom: 20px;
        }

        .vibrar { animation: vibracion 0.15s infinite; }
        @keyframes vibracion {
            0% { transform: translate(2px, 2px); background: #300; }
            50% { transform: translate(-2px, -2px); background: #000; }
            100% { transform: translate(0); }
        }

        #pantalla-exito { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .resultado-vip { margin-top: 20px; padding: 15px; border: 1px dashed var(--oro); font-size: 0.9rem; background: rgba(255, 215, 0, 0.05); }
        
        .boton-opcion { 
            background: #0a0a0a; border: 1px solid #333; color: #aaa; padding: 12px; margin-bottom: 10px; 
            width: 100%; text-align: left; cursor: pointer; font-size: 0.75rem; 
        }
    </style>
</head>
<body>

<div class="contenedor" id="mainContainer">
    <div id="paso1" class="paso activo">
        <h1>SISTEMA ENCRIPTADO</h1>
        <input type="text" id="nombreUsuario" placeholder="TU NOMBRE...">
        <p class="instruccion">Solo personal autorizado.</p>
        <button onclick="siguientePaso()">CARGAR PERFIL</button>
    </div>

    <div id="paso2" class="paso">
        <h1 id="tituloQuiz">VERIFICACIÓN</h1>
        <div id="contenedorPreguntas"></div>
        <button id="btnVerificar" onclick="validarQuiz()">DESBLOQUEAR</button>
    </div>

    <div id="paso3" class="paso">
        <div class="resultado-vip">
            <p id="mensajeFinal"></p>
        </div>
        <button onclick="window.open('https://wa.me/51931517135', '_blank')" style="border-color: #25d366; color: #25d366; margin-top: 20px;">HABLAR CON NICOLLE 📱</button>
    </div>
</div>

<div id="pantalla-error" class="vibrar">
    <h1>🚫 ACCESO DENEGADO</h1>
    <p>USUARIO NO RECONOCIDO.<br>No estás en la lista VIP de Nicolle.<br>Saliendo del sistema...</p>
    <button onclick="location.reload()" style="border-color: white; color: white; width: auto; padding: 10px 30px;">REINTENTAR</button>
</div>

<div id="pantalla-exito">
    <div style="color: var(--verde); font-family: 'Syncopate'; font-size: 1rem; text-align: center;">✨ CONFIRMADA ✨</div>
</div>

<script>
    let nombreActual = "";
    function normalizar(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

    function siguientePaso() {
        const e = normalizar(document.getElementById('nombreUsuario').value);
        const v = ["raymar", "barbara", "ariagny", "keirimar"];
        if (v.includes(e)) { 
            nombreActual = e; 
            document.getElementById('paso1').classList.remove('activo'); 
            document.getElementById('paso2').classList.add('activo'); 
            prepararTest(); 
        } else { 
            document.getElementById('pantalla-error').style.display = "flex"; 
        }
    }

    function prepararTest() {
        const c = document.getElementById('contenedorPreguntas');
        if (nombreActual === "barbara") {
            c.innerHTML = `<p class="pregunta-personal">1. ¿Quién de construcción le atrae a Nicolle?</p><input type="text" id="ans1"><p class="pregunta-personal">2. ¿Por qué parte de ti te hace bullying?</p><input type="text" id="ans2">`;
        } else if (nombreActual === "raymar") {
            c.innerHTML = `<p class="pregunta-personal">1. ¿De dónde es el último que le gustó?</p><input type="text" id="ans1">`;
        } else if (nombreActual === "ariagny") {
            c.innerHTML = `<p class="pregunta-personal">1. ¿Tema de "tu sagrada vida" de anoche?</p><input type="text" id="ans1"><p class="pregunta-personal">2. ¿Libros favoritos de Nicolle?</p><input type="text" id="ans2">`;
        } else if (nombreActual === "keirimar") {
            c.innerHTML = `<button class="boton-opcion" onclick="validarQuiz('f')">A. Pobres sin hijos</button><button class="boton-opcion" onclick="validarQuiz('f')">B. Viejos metiches</button><button class="boton-opcion" onclick="validarQuiz('f')">C. Género/Enfermedad</button>`;
            document.getElementById('btnVerificar').style.display="none";
        }
    }

    function validarQuiz(esp) {
        let p = false;
        const con = (id, l) => { 
            if(!document.getElementById(id)) return false;
            const v = normalizar(document.getElementById(id).value); 
            return l.some(pal => v.includes(normalizar(pal))); 
        };
        
        if (nombreActual === "barbara") { if(con("ans1", ["jonas"]) && con("ans2", ["negra","piel","oscura","color"])) p = true; }
        else if (nombreActual === "raymar") { if(con("ans1", ["pie de sabana"])) p = true; }
        else if (nombreActual === "ariagny") { if(con("ans1", ["bailar","saco","sacó"]) && con("ans2", ["dark","romance"])) p = true; }
        else if (esp === 'f') p = true;

        if (p) { 
            document.getElementById('pantalla-exito').style.display = "flex"; 
            setTimeout(() => { 
                document.getElementById('pantalla-exito').style.display = "none"; 
                document.getElementById('paso2').classList.remove('activo'); 
                document.getElementById('paso3').classList.add('activo'); 
                mostrarS(); 
            }, 2000); 
        } else { 
            document.getElementById('pantalla-error').style.display = "flex"; 
        }
    }

    function mostrarS() {
        const m = { 
            "raymar": "Nicolle dice que necesita noche de karaoke... Y según ella: dale más chismesitos, son vida para su vida.", 
            "barbara": "Según mi creadora, urge que le informes del fulano. La tienes desinformada y ella odia eso. ¡Ponte al día, Barbaridad!", 
            "ariagny": "¡Alerta de Cuñada! 😜 Nicolle dice que son casi familia, pero no se lo digas porque lo negará. Dice que no la llames cuñada todavía... ¡aunque puedes hacerlo para molestarla!", 
            "keirimar": "Nicolle ama lo 'funable' que eres. Contigo puede decir cualquier barbaridad y sabe que no la juzgarás." 
        };
        document.getElementById('mensajeFinal').innerText = m[nombreActual];
    }
</script>
</body>
</html>
