<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA VIP - NICOLLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --rosa: #ff00ff; --cian: #00ffff; --verde: #00ff66; --rojo: #ff4444; }
        body { background: #000; color: white; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; overflow: hidden; box-sizing: border-box; }
        .contenedor { width: 100%; max-width: 380px; background: rgba(15, 15, 15, 0.95); padding: 30px 20px; border: 1px solid #333; text-align: center; z-index: 1; }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 0.85rem; letter-spacing: 2px; color: var(--cian); margin-bottom: 25px; }
        .paso { display: none; }
        .activo { display: block; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: var(--verde); font-family: 'Courier New', monospace; font-size: 1rem; text-align: center; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .pregunta-p { color: var(--rosa); font-weight: bold; margin-bottom: 10px; font-size: 0.85rem; text-align: left; border-left: 3px solid var(--rosa); padding-left: 10px; }
        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--rosa); color: var(--rosa); font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; }
        
        /* ERROR AJUSTADO PARA CELULAR */
        #pantalla-error { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: var(--rojo); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        #pantalla-error h1 { font-size: 1.2rem; color: var(--rojo); margin-bottom: 10px; }
        #pantalla-error p { font-size: 0.85rem; line-height: 1.4; margin-bottom: 20px; max-width: 280px; }
        .vibrar { animation: v 0.1s infinite; }
        @keyframes v { 0% { transform: translate(2px,2px); } 50% { transform: translate(-2px,-2px); } }
        
        #pantalla-exito { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; align-items: center; justify-content: center; color: var(--verde); font-family: 'Syncopate'; font-size: 0.9rem; }
        .res-vip { margin-top: 20px; padding: 15px; border: 1px dashed #ffd700; font-size: 0.85rem; background: rgba(255,215,0,0.05); }
        .btn-op { background: #0a0a0a; border: 1px solid #333; color: #aaa; padding: 12px; margin-bottom: 10px; width: 100%; text-align: left; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="contenedor">
    <div id="p1" class="paso activo">
        <h1>SISTEMA ENCRIPTADO</h1>
        <input type="text" id="user" placeholder="TU NOMBRE...">
        <button onclick="next()">IDENTIFICARSE</button>
    </div>
    <div id="p2" class="paso">
        <h1>VERIFICACIÓN</h1>
        <div id="preguntas"></div>
        <button id="btnV" onclick="validar()">DESBLOQUEAR</button>
    </div>
    <div id="p3" class="paso">
        <div class="res-vip"><p id="mFinal"></p></div>
        <button onclick="window.open('https://wa.me/51931517135','_blank')" style="border-color:#25d366;color:#25d366;margin-top:15px;">AVISAR A NICOLLE</button>
    </div>
</div>

<div id="pantalla-error" class="vibrar">
    <h1>🚫 ACCESO DENEGADO</h1>
    <p>USUARIO NO RECONOCIDO.<br>Abortando sistema... No estás en la lista de Nicolle.</p>
    <button onclick="location.reload()" style="border-color:white;color:white;width:auto;padding:8px 25px;">REINTENTAR</button>
</div>

<div id="pantalla-exito">✨ CONFIRMADA ✨</div>

<script>
    let nActual = "";
    function norm(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

    function next() {
        const e = norm(document.getElementById('user').value);
        const v = ["raymar", "barbara", "ariagny", "keirimar"]; // <--- ARIAGNY CON Y
        if (v.includes(e)) { 
            nActual = e; 
            document.getElementById('p1').classList.remove('activo'); 
            document.getElementById('p2').classList.add('activo'); 
            render(); 
        } else { document.getElementById('pantalla-error').style.display = "flex"; }
    }

    function render() {
        const c = document.getElementById('preguntas');
        if (nActual === "barbara") {
            c.innerHTML = `<p class="pregunta-p">1. ¿Quién de construcción le atrae a Nicolle?</p><input id="a1"><p class="pregunta-p">2. ¿Bullying por qué parte de ti?</p><input id="a2">`;
        } else if (nActual === "raymar") {
            c.innerHTML = `<p class="pregunta-p">1. ¿De dónde es el último que le gustó?</p><input id="a1">`;
        } else if (nActual === "ariagny") { // <--- ARIAGNY CON Y
            c.innerHTML = `<p class="pregunta-p">1. ¿Tema de "tu sagrada vida" de anoche?</p><input id="a1"><p class="pregunta-p">2. ¿Género de libros que odias/ella ama?</p><input id="a2">`;
        } else if (nActual === "keirimar") {
            c.innerHTML = `<button class="btn-op" onclick="validar('f')">A. Pobres sin hijos</button><button class="btn-op" onclick="validar('f')">B. Viejos metiches</button><button class="btn-op" onclick="validar('f')">C. Género/Enfermedad</button>`;
            document.getElementById('btnV').style.display="none";
        }
    }

    function validar(esp) {
        let ok = false;
        const check = (id, list) => { 
            if(!document.getElementById(id)) return false;
            const v = norm(document.getElementById(id).value); 
            return list.some(p => v.includes(norm(p))); 
        };
        
        if (nActual === "barbara") { if(check("a1",["jonas"]) && check("a2",["negra","piel","oscura"])) ok = true; }
        else if (nActual === "raymar") { if(check("a1",["pie de sabana"])) ok = true; }
        else if (nActual === "ariagny") { if(check("a1",["bailar","saco","sacó"]) && check("a2",["dark","romance"])) ok = true; }
        else if (esp === 'f') ok = true;

        if (ok) { 
            document.getElementById('pantalla-exito').style.display = "flex"; 
            setTimeout(() => { 
                document.getElementById('pantalla-exito').style.display = "none"; 
                document.getElementById('p2').classList.remove('activo'); 
                document.getElementById('p3').classList.add('activo'); 
                const msjs = {
                    "raymar": "Nicolle quiere karaoke y que sueltes el chisme, que es su motor.",
                    "barbara": "Informa sobre el fulano. Nicolle odia estar desinformada. ¡Ponte al día!",
                    "ariagny": "¡Hola Cuñada! Nicolle dice que son familia, pero lo negará. ¡Llámala así para molestarla!",
                    "keirimar": "Nicolle ama lo funable que eres. Eres su lugar seguro para el caos."
                };
                document.getElementById('mFinal').innerText = msjs[nActual];
            }, 2000); 
        } else { document.getElementById('pantalla-error').style.display = "flex"; }
    }
</script>
</body>
</html>
